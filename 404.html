<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Netflix Clone</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var r = l.pathname.split('/').slice(1);
      var repo = r[0];
      var rest = r.slice(1).join('/');
      var i = l.hostname.split('.').indexOf('github') !== -1 ? 1 : 0;
      var base = l.hostname.split('.').slice(-(3-i)).join('.');
      var segmentCount = 1 + (rest ? rest.split('/').length : 0);
      var p = r.slice(0, pathSegmentsToKeep).join('/');
      var src = l.protocol + '//' + base + '/' + repo + '/?p=' + p +
                (segmentCount ? '&s=' + segmentCount : '');
      var css = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;';
      var iframe = '<iframe src="' + src + '" style="' + css + '"></iframe>';
      document.write(iframe);
    </script>
  </head>
  <body>
    <noscript>
      <h1>Netflix Clone</h1>
      <p>Para usar esta aplicación, necesitas habilitar JavaScript en tu navegador.</p>
      <p>Por favor, habilita JavaScript y recarga la página.</p>
    </noscript>
  </body>
</html>
